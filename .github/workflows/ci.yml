name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .
          python -m pip install build
          python -m pip install "mypy==1.15.0"
      - name: Ruff lint (correctness + SQLi guardrails)
        run: |
          python -m ruff check . --select F,B
          python -m ruff check src --select S105,S324,S603,S607,S608
      - name: Type check (mypy)
        run: python -m mypy src/lore --config-file pyproject.toml
      - name: Run unit + integration tests
        run: python -m pytest tests/unit tests/integration -q
      - name: Run GA health and perf gates
        run: |
          python -m pytest \
            tests/unit/test_health_structured.py \
            tests/integration/test_perf_regression.py \
            tests/integration/test_server_metrics_and_health.py -q
      - name: Run Phase 3 isolation + federation gates
        run: |
          python -m pytest \
            tests/integration/test_phase3_tool_isolation.py \
            tests/integration/test_federation_worker_idempotency.py \
            tests/integration/test_federation_conflict_resolution.py \
            tests/unit/test_sync_envelope_validation.py \
            tests/integration/test_sync_journal_persistence.py -q
      - name: Run Phase 3 load harness (opt-in; skip by default)
        env:
          LORE_ENABLE_PHASE3_LOAD_TEST: "0"
        run: python -m pytest tests/benchmarks/test_phase3_multi_tenant_load.py -q
      - name: Build package artifacts
        run: python -m build
      - name: Smoke import from built package
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python -c "import lore, lore.server; print('ok')"
