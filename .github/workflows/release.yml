name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install release verification dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .
          python -m pip install build pytest pytest-cov mypy bandit pip-audit
      - name: Ruff lint (correctness + security guardrails)
        run: |
          python -m ruff check . --select F,B
          python -m ruff check src --select S105,S324,S603,S607,S608
      - name: Security scan (bandit)
        run: python -m bandit -r src/lore -ll -q
      - name: Dependency audit - production (pip-audit)
        run: python -m pip_audit -r requirements.lock --disable-pip
      - name: Dependency audit - dev tools (pip-audit)
        run: python -m pip_audit -r requirements-dev.lock --disable-pip
      - name: Run mypy
        run: python -m mypy src/lore --config-file pyproject.toml
      - name: Run unit and integration tests with coverage
        run: python -m pytest tests/unit tests/integration -q --cov=src/lore --cov-report=term-missing --cov-fail-under=80
      - name: Build release artifacts
        run: python -m build
      - name: Smoke import built wheel
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import lore, lore.server"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lore-dist
          path: dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
